name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync source
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='*.db' \
            --exclude='*.db-shm' \
            --exclude='*.db-wal' \
            --exclude='.env*' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }}" \
            ./ root@${{ secrets.SSH_HOST }}:/var/www/finances/

      - name: Build & restart on server
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.SSH_PORT }} \
              root@${{ secrets.SSH_HOST }} << 'ENDSSH'
          set -e
          command -v make || apt-get install -y --no-install-recommends build-essential
          export NVM_DIR="/root/.nvm"
          source "$NVM_DIR/nvm.sh"
          cd /var/www/finances
          /root/.bun/bin/bun install
          /root/.bun/bin/bun run build
          /root/.nvm/versions/node/v20.20.0/bin/pm2 restart finances 2>/dev/null \
            || /root/.nvm/versions/node/v20.20.0/bin/pm2 start \
               '/root/.bun/bin/bun run start -- -p ${{ vars.APP_PORT }}' \
               --name finances
          /root/.nvm/versions/node/v20.20.0/bin/pm2 save
          ENDSSH
